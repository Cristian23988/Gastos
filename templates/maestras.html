<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Configuración</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="topbar">

        <a href="/">Dashboard</a>

        <a href="/maestras">
            Configuración
        </a>

    </div>

    <h1>MAESTRAS</h1>

    <div class="box">

        <table>

            <thead>

                <tr>
                    <th>Tipo</th>
                    <th>Valor Unitario</th>
                    <th>Acción</th>
                </tr>

            </thead>

            <tbody>

                {% for tipo in tipos %}

                <tr>

                    <form method="POST"
                          action="/actualizar_maestra">

                        <td>

                            {{ tipo.nombre }}

                        </td>

                        <td>

                            <input
                                type="number"
                                step="0.01"
                                name="valor_unitario"
                                value="{{ tipo.valor_unitario }}">

                            <input
                                type="hidden"
                                name="tipo_id"
                                value="{{ tipo.id }}">

                        </td>

                        <td>

                            <button type="submit">

                                Guardar

                            </button>

                        </td>

                    </form>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
